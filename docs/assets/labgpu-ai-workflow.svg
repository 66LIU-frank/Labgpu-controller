<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">LabGPU workflow and AI proxy tunnel architecture</title>
  <desc id="desc">A local laptop runs LabGPU UI, reads SSH config, probes GPU servers, opens SSH terminals, and routes remote Claude Code through a session gateway to CC Switch.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .panel{fill:#ffffff;stroke:#d0d5dd;stroke-width:2}
      .soft{fill:#eef6ff;stroke:#84b8ff;stroke-width:2}
      .ok{fill:#ecfdf3;stroke:#75c793;stroke-width:2}
      .warn{fill:#fffaeb;stroke:#f5b544;stroke-width:2}
      .text{font-family:Inter,Arial,sans-serif;fill:#1f2937}
      .muted{font-family:Inter,Arial,sans-serif;fill:#667085}
      .title{font-size:26px;font-weight:800}
      .h{font-size:18px;font-weight:800}
      .p{font-size:14px}
      .small{font-size:12px}
      .arrow{stroke:#475467;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .safe{stroke:#079455;stroke-width:3;fill:none;marker-end:url(#arrowGreen)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475467"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#079455"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="520" rx="24"/>
  <text class="text title" x="42" y="52">LabGPU: local-first GPU workspace + remote AI CLI sessions</text>
  <text class="muted p" x="42" y="78">No root, no remote daemon, no scheduler required. SSH remains your trust boundary.</text>

  <rect class="panel" x="42" y="120" width="275" height="300" rx="18"/>
  <text class="text h" x="70" y="158">Your laptop</text>
  <text class="muted p" x="70" y="188">LabGPU UI</text>
  <text class="muted p" x="70" y="214">~/.ssh/config</text>
  <text class="muted p" x="70" y="240">server groups</text>
  <text class="muted p" x="70" y="266">run capsules</text>
  <rect class="ok" x="70" y="300" width="215" height="72" rx="12"/>
  <text class="text h" x="92" y="330">Session gateway</text>
  <text class="muted small" x="92" y="354">127.0.0.1 only, token required</text>

  <rect class="soft" x="430" y="112" width="295" height="132" rx="18"/>
  <text class="text h" x="458" y="150">GPU servers over SSH</text>
  <text class="muted p" x="458" y="180">nvidia-smi, ps, df, uptime</text>
  <text class="muted p" x="458" y="206">Enter Server opens a real shell</text>

  <rect class="soft" x="430" y="290" width="295" height="132" rx="18"/>
  <text class="text h" x="458" y="328">Remote Claude Code</text>
  <text class="muted p" x="458" y="358">ANTHROPIC_BASE_URL points to</text>
  <text class="muted p" x="458" y="382">remote 127.0.0.1:&lt;session port&gt;</text>

  <rect class="warn" x="850" y="174" width="285" height="170" rx="18"/>
  <text class="text h" x="878" y="212">CC Switch proxy</text>
  <text class="muted p" x="878" y="242">current Claude/Codex provider</text>
  <text class="muted p" x="878" y="268">provider switch stays local</text>
  <text class="muted p" x="878" y="294">real API keys do not go remote</text>

  <path class="arrow" d="M317 190 C360 180 380 170 430 168"/>
  <text class="muted small" x="338" y="154">probe GPUs</text>
  <path class="arrow" d="M317 250 C365 265 385 315 430 332"/>
  <text class="muted small" x="334" y="304">ssh -R tunnel</text>
  <path class="safe" d="M725 356 C770 356 805 282 850 260"/>
  <text class="muted small" x="746" y="332">token checked, then forwarded</text>
  <path class="safe" d="M430 372 C365 380 330 360 285 338"/>
  <text class="muted small" x="308" y="398">remote loopback back to laptop</text>

  <rect class="panel" x="42" y="452" width="1093" height="38" rx="10"/>
  <text class="muted p" x="66" y="476">Daily loop: Home -> Train -> Enter Server -> Claude Code through Proxy Tunnel -> My Runs / My GPU Processes -> diagnose / context / report</text>
</svg>
